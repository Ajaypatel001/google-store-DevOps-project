apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:488b30623c5af8087a1bf479676cfb887936fffa
        ports:
        - containerPort: 80
