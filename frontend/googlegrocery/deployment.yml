apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:8fc72e00ff0a76224eb01994aa7b1a6b0b57562f
        ports:
        - containerPort: 80
