      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-earphones:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
        ports:
        - containerPort: 80
