apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  namespace: google
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
        ports:
        - containerPort: 80
