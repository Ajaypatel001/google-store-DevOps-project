apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
        ports:
        - containerPort: 80
