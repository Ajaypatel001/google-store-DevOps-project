apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:aa361635fecb24340d65d77b57c8c0629659527a
        ports:
        - containerPort: 80
