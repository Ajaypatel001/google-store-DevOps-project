apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:1c7d5b673c376801611c4c0053bb77a240b45c33
          ports:
            - containerPort: 5000
