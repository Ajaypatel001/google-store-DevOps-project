apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:8fc72e00ff0a76224eb01994aa7b1a6b0b57562f
        ports:
        - containerPort: 80

