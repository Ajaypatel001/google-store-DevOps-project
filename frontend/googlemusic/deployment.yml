apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:4e9e73ebc6011797ab5543207419a0b93ef94964
        ports:
        - containerPort: 80
