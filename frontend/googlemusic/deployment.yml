apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:8fc72e00ff0a76224eb01994aa7b1a6b0b57562f
        ports:
        - containerPort: 80
