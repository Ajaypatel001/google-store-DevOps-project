apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:47ebe401c2403520a1dd77f97dddf7817fefb00b
        ports:
        - containerPort: 80
