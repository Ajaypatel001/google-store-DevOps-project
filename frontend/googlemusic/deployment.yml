apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:20ed126f2480a50f163433e35bc43135d27d69f2
        ports:
        - containerPort: 80
