apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:4e9e73ebc6011797ab5543207419a0b93ef94964
        ports:
        - containerPort: 80

