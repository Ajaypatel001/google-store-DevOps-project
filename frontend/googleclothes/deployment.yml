apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:1c7d5b673c376801611c4c0053bb77a240b45c33
        ports:
        - containerPort: 80
