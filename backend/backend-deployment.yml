apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:8fc72e00ff0a76224eb01994aa7b1a6b0b57562f
          ports:
            - containerPort: 5000
