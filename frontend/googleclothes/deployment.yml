apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:3e3806553bab8f390c4e281ffb582ec66d446cff
        ports:
        - containerPort: 80
