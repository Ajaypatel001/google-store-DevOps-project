apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:69dcae528bc74848ced8c7cf2e5a8473cb4c58f9
        ports:
        - containerPort: 80
