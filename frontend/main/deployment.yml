apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:69dcae528bc74848ced8c7cf2e5a8473cb4c58f9
        ports:
        - containerPort: 80

