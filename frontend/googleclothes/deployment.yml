apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:8fc72e00ff0a76224eb01994aa7b1a6b0b57562f
        ports:
        - containerPort: 80
