apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
        ports:
        - containerPort: 80
