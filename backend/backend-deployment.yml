apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:69dcae528bc74848ced8c7cf2e5a8473cb4c58f9
          ports:
            - containerPort: 5000
