apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:20ed126f2480a50f163433e35bc43135d27d69f2
        ports:
        - containerPort: 80
