apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:1c7d5b673c376801611c4c0053bb77a240b45c33
        ports:
        - containerPort: 80
