apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:5d13d5e9626d7c39ea9ad4c49f29e89e79c2731e
        ports:
        - containerPort: 80
