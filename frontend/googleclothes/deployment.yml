apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:f2cca66c9491c1beb854a3a23f47794b780bd209
        ports:
        - containerPort: 80
