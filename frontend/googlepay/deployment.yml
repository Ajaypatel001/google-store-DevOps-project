apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:69dcae528bc74848ced8c7cf2e5a8473cb4c58f9
        ports:
        - containerPort: 80
