apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:3e3806553bab8f390c4e281ffb582ec66d446cff
        ports:
        - containerPort: 80
