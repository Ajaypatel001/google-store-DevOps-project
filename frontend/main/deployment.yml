apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:20ed126f2480a50f163433e35bc43135d27d69f2
        ports:
        - containerPort: 80

