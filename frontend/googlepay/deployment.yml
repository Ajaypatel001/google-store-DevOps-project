apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:8fc72e00ff0a76224eb01994aa7b1a6b0b57562f
        ports:
        - containerPort: 80
