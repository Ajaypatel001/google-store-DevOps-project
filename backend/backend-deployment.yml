apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:4e9e73ebc6011797ab5543207419a0b93ef94964
          ports:
            - containerPort: 5000
