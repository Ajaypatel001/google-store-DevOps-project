apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:f2cca66c9491c1beb854a3a23f47794b780bd209
          ports:
            - containerPort: 5000
