apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:488b30623c5af8087a1bf479676cfb887936fffa
          ports:
            - containerPort: 5000
