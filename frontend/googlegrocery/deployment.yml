apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:be0367642e611f6d0529e8998722beaee12a43be
        ports:
        - containerPort: 80
