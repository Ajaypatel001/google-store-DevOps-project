apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:d531b2d76a8e4a9190f66a2b5db58a108a8f0c83
        ports:
        - containerPort: 80

