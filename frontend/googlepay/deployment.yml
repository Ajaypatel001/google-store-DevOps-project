apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:4e9e73ebc6011797ab5543207419a0b93ef94964
        ports:
        - containerPort: 80
