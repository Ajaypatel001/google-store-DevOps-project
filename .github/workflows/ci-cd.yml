name: CI/CD for Shopping Site (Frontend + Backend)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com"

  FRONTEND_SERVICES: "main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery"
  BACKEND_SERVICE: "backend"

permissions:
  contents: write

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout (FIXED)
      # -------------------------
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # AWS Credentials
      # -------------------------
      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # ECR Login
      # -------------------------
      - name: 📦 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # Build & Push Images
      # -------------------------
      - name: 🛠 Build and Push Docker Images
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"

          # -------- Frontend --------
          for service in $FRONTEND_SERVICES; do
            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"
            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            if [ ! -d "$FOLDER" ]; then
              echo "⚠️ Folder not found: $FOLDER, skipping..."
              continue
            fi

            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "⚠️ No Dockerfile in $FOLDER, skipping..."
              continue
            fi

            echo "🚀 Building $service"

            aws ecr describe-repositories --repository-names $REPO_NAME >/dev/null 2>&1 || \
              aws ecr create-repository \
                --repository-name $REPO_NAME \
                --image-scanning-configuration scanOnPush=true

            docker build -t $IMAGE_URI $FOLDER
            docker push $IMAGE_URI

            sed -i "s|image: .*|image: $IMAGE_URI|" "$FOLDER/deployment.yml"
          done

          # -------- Backend --------
          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          if [ -d "$FOLDER" ]; then
            echo "🚀 Building backend"

            aws ecr describe-repositories --repository-names $REPO_NAME >/dev/null 2>&1 || \
              aws ecr create-repository \
                --repository-name $REPO_NAME \
                --image-scanning-configuration scanOnPush=true

            docker build -t $IMAGE_URI $FOLDER
            docker push $IMAGE_URI

            sed -i "s|image: .*|image: $IMAGE_URI|" "$FOLDER/backend-deployment.yml"
          fi

      # -------------------------
      # Commit YAML changes (FIXED PUSH)
      # -------------------------
      - name: 🔄 Commit updated YAML files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add frontend/**/deployment.yml backend/backend-deployment.yml
          git commit -m "🔄 Update image tags after build [skip ci]" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || echo "Nothing to push"

      # -------------------------
      # Install kubectl (IMPORTANT FIX)
      # -------------------------
      - name: 📦 Install kubectl
        run: |
          curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # -------------------------
      # Configure kubeconfig
      # -------------------------
      - name: ⚙️ Update kubeconfig
        run: |
          aws eks --region $AWS_REGION update-kubeconfig --name naresh

      # -------------------------
      # Deploy to EKS
      # -------------------------
      - name: 🚀 Deploy to EKS
        run: |
          kubectl apply -f frontend/
          kubectl apply -f backend/

      # -------------------------
      # Install jq (optional)
      # -------------------------
      - name: 📦 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
