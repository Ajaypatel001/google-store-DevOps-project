apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:488b30623c5af8087a1bf479676cfb887936fffa
        ports:
        - containerPort: 80
