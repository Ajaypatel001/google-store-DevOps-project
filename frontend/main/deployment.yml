apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:3e3806553bab8f390c4e281ffb582ec66d446cff
        ports:
        - containerPort: 80

