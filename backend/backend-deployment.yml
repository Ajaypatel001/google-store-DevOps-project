apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
          ports:
            - containerPort: 5000
