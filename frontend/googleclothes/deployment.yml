apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:69dcae528bc74848ced8c7cf2e5a8473cb4c58f9
        ports:
        - containerPort: 80
