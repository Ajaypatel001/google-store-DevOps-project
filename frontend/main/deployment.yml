apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:1c7d5b673c376801611c4c0053bb77a240b45c33
        ports:
        - containerPort: 80

