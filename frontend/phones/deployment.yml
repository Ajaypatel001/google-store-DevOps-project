  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:3e3806553bab8f390c4e281ffb582ec66d446cff
        ports:
        - containerPort: 80
