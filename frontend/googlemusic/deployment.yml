apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:3e3806553bab8f390c4e281ffb582ec66d446cff
        ports:
        - containerPort: 80
