apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:f2cca66c9491c1beb854a3a23f47794b780bd209
        ports:
        - containerPort: 80
