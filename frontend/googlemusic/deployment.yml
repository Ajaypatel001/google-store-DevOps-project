apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:0449861d34dc6a58f24902905adf6c8b42a8e8fb
        ports:
        - containerPort: 80
