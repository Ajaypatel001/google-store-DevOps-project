apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:47ebe401c2403520a1dd77f97dddf7817fefb00b
        ports:
        - containerPort: 80
