apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:1c7d5b673c376801611c4c0053bb77a240b45c33
        ports:
        - containerPort: 80
