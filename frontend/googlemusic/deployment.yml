apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:d531b2d76a8e4a9190f66a2b5db58a108a8f0c83
        ports:
        - containerPort: 80
