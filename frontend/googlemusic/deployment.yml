apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:69dcae528bc74848ced8c7cf2e5a8473cb4c58f9
        ports:
        - containerPort: 80
