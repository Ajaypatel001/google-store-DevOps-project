apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:47ebe401c2403520a1dd77f97dddf7817fefb00b
        ports:
        - containerPort: 80
