apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:47ebe401c2403520a1dd77f97dddf7817fefb00b
        ports:
        - containerPort: 80
