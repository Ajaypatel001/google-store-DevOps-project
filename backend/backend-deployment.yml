apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:0449861d34dc6a58f24902905adf6c8b42a8e8fb
          ports:
            - containerPort: 5000
