kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:47ebe401c2403520a1dd77f97dddf7817fefb00b
        ports:
        - containerPort: 80
