apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:be0367642e611f6d0529e8998722beaee12a43be
        ports:
        - containerPort: 80
