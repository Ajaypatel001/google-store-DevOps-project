apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:4e9e73ebc6011797ab5543207419a0b93ef94964
        ports:
        - containerPort: 80
