apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:3e3806553bab8f390c4e281ffb582ec66d446cff
          ports:
            - containerPort: 5000
