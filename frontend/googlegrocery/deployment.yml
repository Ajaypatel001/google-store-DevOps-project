apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:f2cca66c9491c1beb854a3a23f47794b780bd209
        ports:
        - containerPort: 80
