apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:5d13d5e9626d7c39ea9ad4c49f29e89e79c2731e
          ports:
            - containerPort: 5000
