apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:488b30623c5af8087a1bf479676cfb887936fffa
        ports:
        - containerPort: 80

