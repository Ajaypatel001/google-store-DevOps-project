apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:4e9e73ebc6011797ab5543207419a0b93ef94964
        ports:
        - containerPort: 80
