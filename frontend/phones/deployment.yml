apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
        ports:
        - containerPort: 80
