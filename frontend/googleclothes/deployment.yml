apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:d531b2d76a8e4a9190f66a2b5db58a108a8f0c83
        ports:
        - containerPort: 80
