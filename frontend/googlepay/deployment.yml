apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 822849401317.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:488b30623c5af8087a1bf479676cfb887936fffa
        ports:
        - containerPort: 80
