apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:aa361635fecb24340d65d77b57c8c0629659527a
          ports:
            - containerPort: 5000
