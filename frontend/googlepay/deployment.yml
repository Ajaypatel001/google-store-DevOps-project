apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:20ed126f2480a50f163433e35bc43135d27d69f2
        ports:
        - containerPort: 80
