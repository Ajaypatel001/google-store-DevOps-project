apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 339713069769.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:20ed126f2480a50f163433e35bc43135d27d69f2
        ports:
        - containerPort: 80
