apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:47ebe401c2403520a1dd77f97dddf7817fefb00b
        ports:
        - containerPort: 80
