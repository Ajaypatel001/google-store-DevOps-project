  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:be0367642e611f6d0529e8998722beaee12a43be
        ports:
        - containerPort: 80
