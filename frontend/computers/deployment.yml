apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 533267327181.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:c9e5636d66df7520d77f897bc1bb010e6cadfa7c
        ports:
        - containerPort: 80
